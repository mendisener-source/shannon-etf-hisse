<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shannon Wealth Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#111417;--card:#161a1f;--border:#1e2530;--accent:#00e5ff;--green:#00ff88;--red:#ff3860;--text:#e0e8f0;--muted:#5a6a7a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;padding:15px}
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;border-bottom:1px solid var(--accent);margin-bottom:20px}
.h-title{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:1px}
.h-total{font-size:24px;font-family:'Share Tech Mono',monospace;color:var(--green)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:12px}
.ticker-row{display:flex;justify-content:space-between;margin-bottom:8px;font-weight:600}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:20px;padding:8px;outline:none;margin:8px 0}
.band-bar{height:10px;background:var(--bg);border-radius:5px;border:1px solid var(--border);position:relative;margin-top:10px}
.band-fill{height:100%;border-radius:5px;transition:width 0.4s}
.btn{width:100%;padding:15px;border-radius:10px;border:1px solid var(--accent);background:rgba(0,229,255,0.08);color:var(--accent);font-weight:700;cursor:pointer;margin-top:10px}
canvas{width:100%;background:var(--bg);border-radius:8px;margin-top:10px}
.signal-box{margin-top:8px;font-weight:700;padding:8px;border-radius:6px;text-align:center;font-size:14px}
.buy{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid var(--green)}
.sell{background:rgba(255,56,96,0.1);color:var(--red);border:1px solid var(--red)}
</style>
</head>
<body>

<header>
  <div class="h-title">SHANNON TERMINAL</div>
  <div class="h-total" id="header-total">$0</div>
</header>

<div id="assets-container"></div>

<div class="card">
  <div style="font-size:12px;color:var(--muted);margin-bottom:8px">BİRİKMİŞ TOPLAM LOT (Snowball)</div>
  <canvas id="lot-chart" height="150"></canvas>
  <div id="lot-count" style="font-size:14px;text-align:center;margin-top:10px;color:white"></div>
</div>

<button class="btn" onclick="fetchAllPrices()">FİYATLARI GÜNCELLE</button>

<script>
const PORT = [
  {ticker:'AMDG', target:20, buyLim:18, sellLim:22, color:'#00e5ff'},
  {ticker:'SPXL', target:20, buyLim:18, sellLim:22, color:'#ff6d00'},
  {ticker:'NVDU', target:20, buyLim:18, sellLim:22, color:'#00ff88'},
  {ticker:'TSLL', target:20, buyLim:18, sellLim:22, color:'#ffd700'},
  {ticker:'TMF',  target:20, buyLim:18, sellLim:22, color:'#a78bfa'}
];

// BAŞLANGIÇ LOTLARIN (Senin ekran görüntülerindeki veriler)
let myLots = { 'AMDG': 758, 'SPXL': 85, 'NVDU': 430, 'TSLL': 310, 'TMF': 150 };
let prices = {};
let lotHistory = [];

function init() {
  const container = document.getElementById('assets-container');
  PORT.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="ticker-row"><span>${p.ticker}</span><span id="weight-${p.ticker}">%0</span></div>
      <input type="number" class="inp" id="price-${p.ticker}" value="0" onchange="updateUI()">
      <div class="band-bar"><div class="band-fill" id="fill-${p.ticker}" style="background:${p.color}"></div></div>
      <div id="sig-${p.ticker}"></div>
    `;
    container.appendChild(div);
  });
  fetchAllPrices();
}

async function fetchAllPrices() {
  for(const p of PORT) {
    try {
      const url = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+p.ticker)}`;
      const res = await fetch(url);
      const d = await res.json();
      const pr = d.chart.result[0].meta.regularMarketPrice;
      if(pr) {
        prices[p.ticker] = pr;
        document.getElementById(`price-${p.ticker}`).value = pr.toFixed(2);
      }
    } catch(e) { console.log("Hata:", p.ticker); }
  }
  updateUI();
}

function updateUI() {
  let total = 0;
  PORT.forEach(p => {
    prices[p.ticker] = parseFloat(document.getElementById(`price-${p.ticker}`).value) || 0;
    total += prices[p.ticker] * myLots[p.ticker];
  });
  
  document.getElementById('header-total').textContent = '$' + total.toLocaleString(undefined, {maximumFractionDigits:0});

  let currentTotalLots = 0;
  PORT.forEach(p => {
    let weight = total > 0 ? ((prices[p.ticker] * myLots[p.ticker]) / total) * 100 : 0;
    document.getElementById(`weight-${p.ticker}`).textContent = '%' + weight.toFixed(1);
    document.getElementById(`fill-${p.ticker}`).style.width = weight + '%';
    
    const sig = document.getElementById(`sig-${p.ticker}`);
    if(weight >= p.sellLim) sig.innerHTML = `<div class="signal-box sell">SATIŞ ZAMANI</div>`;
    else if(weight <= p.buyLim) sig.innerHTML = `<div class="signal-box buy">ALIM ZAMANI</div>`;
    else sig.innerHTML = '';
    
    currentTotalLots += myLots[p.ticker];
  });

  lotHistory.push(currentTotalLots);
  if(lotHistory.length > 50) lotHistory.shift();
  drawChart();
  document.getElementById('lot-count').textContent = `Toplam Lot: ${currentTotalLots}`;
}

function drawChart() {
  const c = document.getElementById('lot-chart');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  if(lotHistory.length < 2) return;
  
  const min = Math.min(...lotHistory) * 0.99, max = Math.max(...lotHistory) * 1.01;
  ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.beginPath();
  lotHistory.forEach((v, i) => {
    const x = (i / (lotHistory.length - 1)) * W;
    const y = H - ((v - min) / (max - min)) * H;
    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

window.onload = init;
</script>
</body>
</html>
